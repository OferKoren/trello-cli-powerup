<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Agent Settings</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="settings-field">
    <label for="cli-base-url">CLI webhook URL <span style="color:#97a0af; font-weight:normal;">(v2)</span></label>
    <input type="url" id="cli-base-url" placeholder="https://your-server/webhook" />
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="saveSettings()">Save</button>
  </div>

  <p class="version-note" id="version-display"></p>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./version.js"></script>
  <script src="./settings.js"></script>
</body>
</html>
